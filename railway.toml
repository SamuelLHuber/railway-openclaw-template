[build]
# Use our thin Dockerfile wrapper (FROM ghcr.io/openclaw/openclaw)
dockerfilePath = "Dockerfile"

[deploy]
# Railway health checks — the gateway needs ~15s to start
healthcheckPath = "/healthz"
healthcheckTimeout = 300
# Let Dockerfile CMD handle the start
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
# Require a volume mount at /data for persistent state
requiredMountPath = "/data"
