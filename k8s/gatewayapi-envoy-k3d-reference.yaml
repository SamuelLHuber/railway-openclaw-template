# Reference-only local Gateway API test using Envoy Gateway on k3d.
#
# Purpose:
# - prove that OpenClaw can be routed through Kubernetes Gateway API
# - prove that the Control UI can connect through that path
#
# Notes:
# - this is a local validation artifact, not a production-ready manifest
# - in local testing, we used HTTP for simplicity and port-forwarded the Envoy
#   data-plane Service
# - production must use HTTPS and a real hostname
# - production must validate gateway.trustedProxies for the chosen dataplane

apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: openclaw-gateway
  namespace: openclaw
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openclaw-route
  namespace: openclaw
spec:
  parentRefs:
    - name: openclaw-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: openclaw
          port: 8080
