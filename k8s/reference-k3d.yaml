apiVersion: v1
kind: Namespace
metadata:
  name: openclaw
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw
  namespace: openclaw
automountServiceAccountToken: false
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secret
  namespace: openclaw
type: Opaque
stringData:
  OPENCLAW_GATEWAY_PASSWORD: change-me
  OPENCLAW_ALLOWED_ORIGIN: https://openclaw.example.com
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-data
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-openclaw-state
          image: busybox:1.36
          command:
            - sh
            - -lc
            - |
              set -eu
              mkdir -p /data/.openclaw /data/workspace
              if [ ! -f /data/.openclaw/openclaw.json ]; then
                cat > /data/.openclaw/openclaw.json <<EOF
              {
                agents: {
                  defaults: {
                    model: { primary: "openai/gpt-5.4-mini" },
                  },
                },
                gateway: {
                  port: 8080,
                  auth: {
                    mode: "password",
                    password: "${OPENCLAW_GATEWAY_PASSWORD}",
                  },
                  controlUi: {
                    allowedOrigins: ["${OPENCLAW_ALLOWED_ORIGIN}"],
                  },
                },
              }
              EOF
              fi
              chown -R 1000:1000 /data
          env:
            - name: OPENCLAW_GATEWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: OPENCLAW_GATEWAY_PASSWORD
            - name: OPENCLAW_ALLOWED_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: OPENCLAW_ALLOWED_ORIGIN
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER", "DAC_OVERRIDE"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.4.2
          imagePullPolicy: IfNotPresent
          command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--bind", "lan", "--port", "8080"]
          env:
            - name: HOME
              value: /data
            - name: OPENCLAW_STATE_DIR
              value: /data/.openclaw
            - name: OPENCLAW_WORKSPACE_DIR
              value: /data/workspace
            - name: OPENCLAW_GATEWAY_PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: openclaw
spec:
  type: ClusterIP
  selector:
    app: openclaw
  ports:
    - name: http
      port: 8080
      targetPort: http
