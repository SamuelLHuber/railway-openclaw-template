# Cluster-specific values for hoth
# Usage:
# helm upgrade --install openclaw ./charts/openclaw -n openclaw -f k8s/values-hoth.yaml

namespace:
  create: false
  name: openclaw
  labels:
    istio-injection: disabled
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

secret:
  create: false
  existingSecret: openclaw-secret

image:
  tag: 2026.4.9

persistence:
  storageClassName: local-path

resources:
  openclaw:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  initContainer:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

httpRoute:
  enabled: true
  hostname: openclaw.kirmes.io
  parentRefs:
    - name: dtech-gateway
      namespace: istio-system

openclaw:
  runtimeAsRoot: true
  runtimePackageManagerCompat: true
  gateway:
    trustedProxies:
      - 10.42.0.46/32

networkPolicy:
  denyEgress: true
  allowMailEgress: true
  mailPorts:
    - 25
    - 110
    - 143
    - 465
    - 587
    - 993
  ingressFrom:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: istio-system
      podSelector:
        matchLabels:
          gateway.networking.k8s.io/gateway-name: dtech-gateway

backup:
  enabled: true
  schedule: "5 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  backoffLimit: 1
  archive:
    includeWorkspace: true
    onlyConfig: false
  resources:
    createBackup:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    restic:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
  restic:
    createSecret: true
    repository: /data/restic-repo
    password: openclaw-local-restic-password
  retention:
    keepHourly: 12
    keepDaily: 7

restore:
  enabled: false
  snapshot: latest
  preserveCurrentState: true
  resources:
    resticRestore:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    verifyBackup:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    applyRestore:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
