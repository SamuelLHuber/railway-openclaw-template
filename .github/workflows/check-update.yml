name: Check for OpenClaw Updates

on:
  schedule:
    # Check daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest OpenClaw release tag
        id: latest
        run: |
          LATEST=$(curl -fsSL https://api.github.com/repos/openclaw/openclaw/releases/latest \
            | jq -r '.tag_name | ltrimstr("v")')

          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest OpenClaw release: $LATEST"

      - name: Get current pinned version
        id: current
        run: |
          # Read the version from Dockerfile ARG
          CURRENT=$(sed -n 's/^ARG OPENCLAW_VERSION=//p' Dockerfile | head -1)
          echo "tag=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current pinned version: $CURRENT"

      - name: Compare and update
        if: steps.latest.outputs.tag != steps.current.outputs.tag && steps.latest.outputs.tag != 'latest' && steps.latest.outputs.tag != ''
        env:
          LATEST: ${{ steps.latest.outputs.tag }}
          CURRENT: ${{ steps.current.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Update available: $CURRENT → $LATEST"

          # Update Dockerfile
          sed -i "s/OPENCLAW_VERSION=.*/OPENCLAW_VERSION=$LATEST/" Dockerfile

          # Update README badge/version references
          sed -i "s|openclaw/openclaw:[0-9]\{4\}\.[0-9]*\.[0-9]*[^ ]*|openclaw/openclaw:$LATEST|g" README.md

          # Create PR
          BRANCH="auto-update/openclaw-$LATEST"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: update OpenClaw to $LATEST"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: update OpenClaw to $LATEST" \
            --body "Automated update from \`$CURRENT\` → \`$LATEST\`

          Release: https://github.com/openclaw/openclaw/releases/tag/v$LATEST
          Image: \`ghcr.io/openclaw/openclaw:$LATEST\`

          Merge to redeploy on Railway." \
            --head "$BRANCH" \
            --base main
