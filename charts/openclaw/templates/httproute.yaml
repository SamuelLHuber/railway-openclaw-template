{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "openclaw.fullname" . }}
  namespace: {{ .Values.namespace.name | default .Release.Namespace }}
  labels:
{{ include "openclaw.labels" . | indent 4 }}
spec:
  hostnames:
    - {{ required "httpRoute.hostname is required when httpRoute.enabled=true" .Values.httpRoute.hostname | quote }}
  parentRefs:
{{ toYaml .Values.httpRoute.parentRefs | indent 4 }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "openclaw.fullname" . }}
          port: 8080
{{- end }}
