{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw.secretName" . }}
  namespace: {{ .Values.namespace.name | default .Release.Namespace }}
  labels:
{{ include "openclaw.labels" . | indent 4 }}
type: Opaque
stringData:
  OPENCLAW_GATEWAY_PASSWORD: {{ required "secret.gatewayPassword is required when secret.create=true and secret.existingSecret is empty" .Values.secret.gatewayPassword | quote }}
  OPENCLAW_ALLOWED_ORIGIN: {{ required "secret.allowedOrigin is required when secret.create=true and secret.existingSecret is empty" .Values.secret.allowedOrigin | quote }}
  {{- with .Values.secret.providerKeys }}
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
