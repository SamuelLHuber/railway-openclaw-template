{{- if and .Values.backup.enabled .Values.backup.restic.createSecret (not .Values.backup.restic.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw.backupSecretName" . }}
  namespace: {{ .Values.namespace.name | default .Release.Namespace }}
  labels:
{{ include "openclaw.labels" . | indent 4 }}
type: Opaque
stringData:
  RESTIC_REPOSITORY: {{ required "backup.restic.repository is required when backup.enabled=true and backup.restic.createSecret=true" .Values.backup.restic.repository | quote }}
  RESTIC_PASSWORD: {{ required "backup.restic.password is required when backup.enabled=true and backup.restic.createSecret=true" .Values.backup.restic.password | quote }}
  {{- with .Values.backup.restic.extraEnv }}
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
