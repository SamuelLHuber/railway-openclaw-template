apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw.fullname" . }}
  namespace: {{ .Values.namespace.name | default .Release.Namespace }}
  labels:
{{ include "openclaw.labels" . | indent 4 }}
spec:
  type: ClusterIP
  selector:
{{ include "openclaw.matchLabels" . | indent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http
